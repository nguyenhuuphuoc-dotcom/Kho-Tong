services:
  - type: web
    name: khounice-web
    env: python
    rootDir: .
    buildCommand: >
      pip install -r backend/requirements.txt &&
      cd frontend &&
      npm install &&
      npm run build
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
